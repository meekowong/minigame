<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仿畫點陣圖</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .dot {
      width: 20px;
      height: 20px;
      background: #000;
      border-radius: 50%;
      cursor: pointer;
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .panel-container {
      position: relative;
      background: #fff;
    }
    .line {
      stroke: #ef4444;
      stroke-width: 4;
      stroke-linecap: round;
    }
    .temp-line {
      stroke: #ef4444;
      stroke-width: 4;
      stroke-linecap: round;
      opacity: 0.6;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-white font-sans">
  <div id="app" class="h-full w-full flex flex-col"><!-- Home Screen -->
   <div id="home-screen" class="h-full w-full flex flex-col items-center justify-center gap-8">
    <h1 id="main-title" class="text-4xl font-bold text-gray-800 mb-8">仿畫點陣圖</h1>
    <p class="text-lg text-gray-600 mb-4">選擇模式開始遊戲</p>
    <div class="flex gap-6"><button onclick="startGame(3)" class="px-8 py-4 bg-blue-500 hover:bg-blue-600 text-white text-xl font-semibold rounded-xl shadow-lg transition-all transform hover:scale-105"> 3×3 模式 </button> <button onclick="startGame(4)" class="px-8 py-4 bg-green-500 hover:bg-green-600 text-white text-xl font-semibold rounded-xl shadow-lg transition-all transform hover:scale-105"> 4×4 模式 </button> <button onclick="startGame(5)" class="px-8 py-4 bg-purple-500 hover:bg-purple-600 text-white text-xl font-semibold rounded-xl shadow-lg transition-all transform hover:scale-105"> 5×5 模式 </button>
    </div>
   </div><!-- Game Screen -->
   <div id="game-screen" class="h-full w-full flex-col hidden"><!-- Top Bar -->
    <div class="flex justify-between items-center px-6 py-3 bg-gray-100 border-b border-gray-200"><button onclick="goHome()" class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white font-semibold rounded-lg transition-all"> 返回主頁 </button>
     <div id="timer-display" class="text-2xl font-bold text-gray-700">
      剩餘時間: <span id="timer">15</span>秒
     </div>
     <div class="flex gap-3"><button onclick="clearCurrentPanel()" class="px-4 py-2 bg-yellow-500 hover:bg-yellow-600 text-white font-semibold rounded-lg transition-all"> 清除 </button> <button id="submit-btn" onclick="submitAnswer()" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-lg transition-all hidden"> 提交 </button>
     </div>
    </div><!-- Status Message -->
    <div id="status-message" class="text-center py-2 text-xl font-semibold text-blue-600">
     玩家1：請在示範區域連點
    </div><!-- Game Panels -->
    <div class="flex-1 flex items-center justify-center gap-12 px-8 pb-4"><!-- Player 1 Panel -->
     <div class="flex flex-col items-center">
      <h2 class="text-2xl font-bold text-blue-600 mb-3">示範</h2>
      <div id="panel1" class="panel-container border-4 border-blue-500 rounded-xl bg-white">
       <svg id="svg1" class="absolute top-0 left-0 w-full h-full pointer-events-none"></svg>
      </div>
     </div><!-- Player 2 Panel -->
     <div class="flex flex-col items-center">
      <h2 class="text-2xl font-bold text-green-600 mb-3">答案</h2>
      <div id="panel2" class="panel-container border-4 border-green-500 rounded-xl bg-white">
       <svg id="svg2" class="absolute top-0 left-0 w-full h-full pointer-events-none"></svg>
      </div>
     </div>
    </div>
   </div><!-- Success Overlay -->
   <div id="success-overlay" class="fixed inset-0 bg-white bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white p-8 rounded-2xl shadow-2xl text-center border-2 border-green-500">
     <div class="text-6xl mb-4">
      ✓
     </div>
     <h2 class="text-3xl font-bold text-green-600 mb-6">正確！</h2><button onclick="playAgain()" class="px-8 py-4 bg-blue-500 hover:bg-blue-600 text-white text-xl font-semibold rounded-xl transition-all"> 再來一次 </button>
    </div>
   </div><!-- Incorrect Overlay -->
   <div id="incorrect-overlay" class="fixed inset-0 bg-white bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white p-8 rounded-2xl shadow-2xl text-center border-2 border-red-500">
     <div class="text-6xl mb-4">
      ✗
     </div>
     <h2 class="text-3xl font-bold text-red-600 mb-6">不正確，請再試一次</h2><button onclick="tryAgain()" class="px-8 py-4 bg-yellow-500 hover:bg-yellow-600 text-white text-xl font-semibold rounded-xl transition-all"> 再試一次 </button>
    </div>
   </div>
  </div>
  <script>
    // Game State
    let gridSize = 3;
    let currentPlayer = 1;
    let player1Lines = [];
    let player2Lines = [];
    let isDrawing = false;
    let startDot = null;
    let timerInterval = null;
    let timeLeft = 15;
    let tempLine = null;

    // Config
    const defaultConfig = {
      game_title: '仿畫點陣圖'
    };

    // Element SDK initialization
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          const title = config.game_title || defaultConfig.game_title;
          document.getElementById('main-title').textContent = title;
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['game_title', config.game_title || defaultConfig.game_title]
        ])
      });
    }

    function startGame(size) {
      gridSize = size;
      currentPlayer = 1;
      player1Lines = [];
      player2Lines = [];
      timeLeft = 15;

      document.getElementById('home-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('game-screen').classList.add('flex');

      setupPanels();
      updateStatus();
      startTimer();
    }

    function goHome() {
      stopTimer();
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('flex');
      document.getElementById('home-screen').classList.remove('hidden');
      document.getElementById('success-overlay').classList.add('hidden');
      document.getElementById('incorrect-overlay').classList.add('hidden');
    }

    function setupPanels() {
      const panelSize = Math.min(280, window.innerHeight * 0.5);
      const dotSpacing = panelSize / (gridSize + 1);

      ['panel1', 'panel2'].forEach((panelId, index) => {
        const panel = document.getElementById(panelId);
        const svg = document.getElementById(`svg${index + 1}`);
        
        panel.style.width = panelSize + 'px';
        panel.style.height = panelSize + 'px';
        panel.innerHTML = '';
        
        // Create new SVG
        const newSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        newSvg.id = `svg${index + 1}`;
        newSvg.classList.add('absolute', 'top-0', 'left-0', 'w-full', 'h-full', 'pointer-events-none');
        newSvg.style.width = panelSize + 'px';
        newSvg.style.height = panelSize + 'px';
        panel.appendChild(newSvg);

        // Create dots
        for (let row = 0; row < gridSize; row++) {
          for (let col = 0; col < gridSize; col++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.dataset.row = row;
            dot.dataset.col = col;
            dot.dataset.panel = index + 1;
            
            const x = (col + 1) * dotSpacing;
            const y = (row + 1) * dotSpacing;
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';

            dot.addEventListener('mousedown', onDotMouseDown);
            dot.addEventListener('mouseup', onDotMouseUp);
            dot.addEventListener('mouseenter', onDotMouseEnter);

            panel.appendChild(dot);
          }
        }

        panel.addEventListener('mousemove', onPanelMouseMove);
        panel.addEventListener('mouseleave', onPanelMouseLeave);
      });

      document.getElementById('submit-btn').classList.add('hidden');
    }

    function onDotMouseDown(e) {
      e.preventDefault();
      const panel = parseInt(e.target.dataset.panel);
      
      if ((currentPlayer === 1 && panel !== 1) || (currentPlayer === 2 && panel !== 2)) {
        return;
      }

      isDrawing = true;
      startDot = {
        row: parseInt(e.target.dataset.row),
        col: parseInt(e.target.dataset.col),
        panel: panel
      };
    }

    function onDotMouseUp(e) {
      if (!isDrawing || !startDot) return;

      const endDot = {
        row: parseInt(e.target.dataset.row),
        col: parseInt(e.target.dataset.col),
        panel: parseInt(e.target.dataset.panel)
      };

      if (startDot.panel === endDot.panel && 
          (startDot.row !== endDot.row || startDot.col !== endDot.col)) {
        
        const line = {
          from: { row: startDot.row, col: startDot.col },
          to: { row: endDot.row, col: endDot.col }
        };

        if (currentPlayer === 1) {
          if (!lineExists(player1Lines, line)) {
            player1Lines.push(line);
            drawLine('svg1', line);
          }
        } else {
          if (!lineExists(player2Lines, line)) {
            player2Lines.push(line);
            drawLine('svg2', line);
          }
        }
      }

      // Remove temp line
      removeTempLine();
      isDrawing = false;
      startDot = null;
    }

    function onDotMouseEnter(e) {
      if (!isDrawing || !startDot) return;
      
      const endPanel = parseInt(e.target.dataset.panel);
      if (startDot.panel !== endPanel) return;

      const endRow = parseInt(e.target.dataset.row);
      const endCol = parseInt(e.target.dataset.col);

      if (startDot.row !== endRow || startDot.col !== endCol) {
        drawTempLine(startDot.panel, startDot, { row: endRow, col: endCol });
      }
    }

    function onPanelMouseMove(e) {
      if (!isDrawing || !startDot) return;
      
      const panel = e.currentTarget;
      const rect = panel.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const panelSize = panel.offsetWidth;
      const dotSpacing = panelSize / (gridSize + 1);
      
      const startX = (startDot.col + 1) * dotSpacing;
      const startY = (startDot.row + 1) * dotSpacing;
      
      drawTempLineToPoint(startDot.panel, startX, startY, x, y);
    }

    function onPanelMouseLeave(e) {
      if (isDrawing) {
        removeTempLine();
      }
    }

    function drawTempLineToPoint(panelNum, x1, y1, x2, y2) {
      removeTempLine();
      
      const svg = document.getElementById(`svg${panelNum}`);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.classList.add('temp-line');
      line.id = 'temp-line';
      svg.appendChild(line);
    }

    function drawTempLine(panelNum, from, to) {
      removeTempLine();
      
      const panel = document.getElementById(`panel${panelNum}`);
      const panelSize = panel.offsetWidth;
      const dotSpacing = panelSize / (gridSize + 1);
      
      const x1 = (from.col + 1) * dotSpacing;
      const y1 = (from.row + 1) * dotSpacing;
      const x2 = (to.col + 1) * dotSpacing;
      const y2 = (to.row + 1) * dotSpacing;
      
      const svg = document.getElementById(`svg${panelNum}`);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.classList.add('temp-line');
      line.id = 'temp-line';
      svg.appendChild(line);
    }

    function removeTempLine() {
      const tempLine = document.getElementById('temp-line');
      if (tempLine) tempLine.remove();
    }

    function lineExists(lines, newLine) {
      return lines.some(line => 
        (line.from.row === newLine.from.row && line.from.col === newLine.from.col &&
         line.to.row === newLine.to.row && line.to.col === newLine.to.col) ||
        (line.from.row === newLine.to.row && line.from.col === newLine.to.col &&
         line.to.row === newLine.from.row && line.to.col === newLine.from.col)
      );
    }

    function drawLine(svgId, line) {
      const svg = document.getElementById(svgId);
      const panel = svg.parentElement;
      const panelSize = panel.offsetWidth;
      const dotSpacing = panelSize / (gridSize + 1);

      const x1 = (line.from.col + 1) * dotSpacing;
      const y1 = (line.from.row + 1) * dotSpacing;
      const x2 = (line.to.col + 1) * dotSpacing;
      const y2 = (line.to.row + 1) * dotSpacing;

      const svgLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      svgLine.setAttribute('x1', x1);
      svgLine.setAttribute('y1', y1);
      svgLine.setAttribute('x2', x2);
      svgLine.setAttribute('y2', y2);
      svgLine.classList.add('line');
      svg.appendChild(svgLine);
    }

    function clearCurrentPanel() {
      if (currentPlayer === 1) {
        player1Lines = [];
        const svg = document.getElementById('svg1');
        svg.innerHTML = '';
      } else {
        player2Lines = [];
        const svg = document.getElementById('svg2');
        svg.innerHTML = '';
      }
    }

    function startTimer() {
      stopTimer();
      timeLeft = 15;
      updateTimerDisplay();
      
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft <= 0) {
          stopTimer();
          switchToPlayer2();
        }
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function updateTimerDisplay() {
      document.getElementById('timer').textContent = timeLeft;
      const timerDisplay = document.getElementById('timer-display');
      
      if (currentPlayer === 1) {
        timerDisplay.classList.remove('hidden');
      } else {
        timerDisplay.classList.add('hidden');
      }
    }

    function switchToPlayer2() {
      currentPlayer = 2;
      updateStatus();
      document.getElementById('submit-btn').classList.remove('hidden');
      document.getElementById('timer-display').classList.add('hidden');
    }

    function updateStatus() {
      const statusEl = document.getElementById('status-message');
      if (currentPlayer === 1) {
        statusEl.textContent = '玩家1：請在示範區域連點';
        statusEl.className = 'text-center py-2 text-xl font-semibold text-blue-600';
      } else {
        statusEl.textContent = '玩家2：請在答案區域複製示範圖案';
        statusEl.className = 'text-center py-2 text-xl font-semibold text-green-600';
      }
    }

    function submitAnswer() {
      if (currentPlayer !== 2) return;

      const isCorrect = compareLines();
      
      if (isCorrect) {
        document.getElementById('success-overlay').classList.remove('hidden');
      } else {
        document.getElementById('incorrect-overlay').classList.remove('hidden');
      }
    }

    function compareLines() {
      if (player1Lines.length !== player2Lines.length) return false;

      for (const line1 of player1Lines) {
        const found = player2Lines.some(line2 => 
          (line1.from.row === line2.from.row && line1.from.col === line2.from.col &&
           line1.to.row === line2.to.row && line1.to.col === line2.to.col) ||
          (line1.from.row === line2.to.row && line1.from.col === line2.to.col &&
           line1.to.row === line2.from.row && line1.to.col === line2.from.col)
        );
        if (!found) return false;
      }

      return true;
    }

    function tryAgain() {
      document.getElementById('incorrect-overlay').classList.add('hidden');
      player2Lines = [];
      const svg = document.getElementById('svg2');
      svg.innerHTML = '';
    }

    function playAgain() {
      document.getElementById('success-overlay').classList.add('hidden');
      currentPlayer = 1;
      player1Lines = [];
      player2Lines = [];
      
      // Clear both panels
      document.getElementById('svg1').innerHTML = '';
      document.getElementById('svg2').innerHTML = '';
      
      document.getElementById('submit-btn').classList.add('hidden');
      updateStatus();
      startTimer();
    }

    // Global mouseup to cancel drawing
    document.addEventListener('mouseup', () => {
      if (isDrawing) {
        removeTempLine();
        isDrawing = false;
        startDot = null;
      }
    });
  </script>
