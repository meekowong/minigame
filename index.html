<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的遊戲大廳</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        
        /* 橫向捲動容器 */
        .scroll-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            width: 100vw;
            height: 100vh;
            scrollbar-width: none; /* 隱藏捲軸 (Firefox) */
        }
        .scroll-container::-webkit-scrollbar { display: none; /* 隱藏捲軸 (Chrome) */ }

        /* 每張全螢幕封面圖 */
        .game-card {
            flex: 0 0 100vw;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            cursor: pointer;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保圖片填滿螢幕不變形 */
        }

        .game-title {
            position: absolute;
            bottom: 50px;
            left: 50px;
            color: white;
            font-size: 3rem;
            font-family: sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <!-- 遊戲 1 -->
        <div class="game-card" onclick="location.href='巡邏走廊.html'">
            <img src="images/bg1.jpg" alt="Game 1">
            <div class="game-title">點擊開始：遊戲一</div>
        </div>

        <!-- 遊戲 2 -->
        <div class="game-card" onclick="location.href='模擬揸巴士.html'">
            <img src="images/bg2.jpg" alt="Game 2">
            <div class="game-title">點擊開始：遊戲二</div>
        </div>
    </div>

</body>
</html>
