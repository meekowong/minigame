<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的遊戲大廳</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        
        /* 橫向捲動容器 */
        .scroll-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            width: 100vw;
            height: 100vh;
            scrollbar-width: none; /* 隱藏捲軸 (Firefox) */
            scroll-behavior: smooth;
        }
        .scroll-container::-webkit-scrollbar { display: none; /* 隱藏捲軸 (Chrome) */ }

        /* 每張全螢幕封面圖 */
        .game-card {
            flex: 0 0 100vw;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            cursor: pointer;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保圖片填滿螢幕不變形 */
        }

        .game-title {
            position: absolute;
            bottom: 50px;
            left: 50px;
            color: white;
            font-size: 3rem;
            font-family: sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <!-- 遊戲 1 -->
        <div class="game-card" onclick="location.href='巡邏走廊.html'">
            <img src="巡邏走廊 - 規則介紹.png" alt="Game 1">
            <div class="game-title">點擊開始：巡邏走廊</div>
        </div>

        <!-- 遊戲 2 -->
        <div class="game-card" onclick="location.href='模擬揸巴士.html'">
            <img src="模擬揸巴士 - 規則介紹.png" alt="Game 2">
            <div class="game-title">點擊開始：模擬揸巴士</div>
        </div>
        <!-- 遊戲 3 -->
        <div class="game-card" onclick="location.href='模擬郵差分信.html'">
            <img src="模擬郵差分信 - 規則介紹.png" alt="Game 2">
            <div class="game-title">點擊開始：模擬郵差分信</div>
        </div>        
    </div>
    <script>
    const container = document.querySelector('.scroll-container');
    let currentIndex = 0;
    const totalGames = document.querySelectorAll('.game-card').length;

    function autoScroll() {
        currentIndex++;
        
        // 如果捲動到最後一張，回到第一張
        if (currentIndex >= totalGames) {
            currentIndex = 0;
        }

        // 執行平滑捲動
        container.scrollTo({
            left: currentIndex * window.innerWidth,
            behavior: 'smooth'
        });
    }

    // 每 3 秒執行一次 (3000 毫秒)
    let scrollInterval = setInterval(autoScroll, 3000);

    // 當使用者手動觸碰或點擊時，暫時停止自動捲動，避免衝突
    container.addEventListener('touchstart', () => clearInterval(scrollInterval));
    container.addEventListener('mousedown', () => clearInterval(scrollInterval));
    </script>

</body>
</html>
